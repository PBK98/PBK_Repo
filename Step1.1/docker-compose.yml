services:
  ubuntu-server:
    build:
      context: .
      dockerfile: ./LinuxServer
    image: pbk-ubuntu
    container_name: ubuntu-server
    stdin_open: true
    tty: true
    networks:
      - my-network
    volumes:
      - ubuntu-volume:/data

  nginx-server:
    build:
      context: .
      dockerfile: ./WebServer
    image: pbk-nginx
    container_name: nginx-server
    ports:
      - "80:80"
    networks:
      - my-network
    volumes:
      - ./WebServer/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-volume:/var/log/nginx
    depends_on:
      - ubuntu-server

volumes:
  ubuntu-volume:
  nginx-volume:

networks:
  my-network:
    driver: bridge